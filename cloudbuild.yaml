# Google Cloud Build Configuration
# Deploys Mohawk Medibles AI Directory to Cloud Run

steps:
  # Step 1: Install dependencies and build
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    
  # Step 2: Generate Prisma client
  - name: 'node:20'
    entrypoint: 'npx'
    args: ['prisma', 'generate']
    env:
      - 'DATABASE_URL=${_DATABASE_URL}'
      
  # Step 3: Build Next.js app
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
      - 'DATABASE_URL=${_DATABASE_URL}'
      - 'OPENAI_API_KEY=${_OPENAI_API_KEY}'
      - 'PERPLEXITY_API_KEY=${_PERPLEXITY_API_KEY}'
      
  # Step 4: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mohawk-medibles:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mohawk-medibles:latest'
      - '.'
      
  # Step 5: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mohawk-medibles:$COMMIT_SHA'
      
  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mohawk-medibles'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mohawk-medibles:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '${_MEMORY}'
      - '--cpu'
      - '${_CPU}'
      - '--concurrency'
      - '${_CONCURRENCY}'
      - '--max-instances'
      - '${_MAX_INSTANCES}'
      - '--min-instances'
      - '${_MIN_INSTANCES}'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL},DATABASE_URL=${_DATABASE_URL},OPENAI_API_KEY=${_OPENAI_API_KEY},PERPLEXITY_API_KEY=${_PERPLEXITY_API_KEY}'
      - '--set-secrets'
      - 'DATABASE_URL=database-url:latest,OPENAI_API_KEY=openai-api-key:latest,PERPLEXITY_API_KEY=perplexity-api-key:latest'

# Store images in Google Container Registry
images:
  - 'gcr.io/$PROJECT_ID/mohawk-medibles:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mohawk-medibles:latest'

# Substitution variables (set these in Cloud Build triggers)
substitutions:
  _REGION: us-central1
  _MEMORY: 2Gi
  _CPU: '2'
  _CONCURRENCY: '80'
  _MAX_INSTANCES: '100'
  _MIN_INSTANCES: '1'
  _NEXT_PUBLIC_APP_URL: https://mohawkmedibles.ca
  _DATABASE_URL: ''  # Set in Cloud Secret Manager
  _OPENAI_API_KEY: ''  # Set in Cloud Secret Manager
  _PERPLEXITY_API_KEY: ''  # Set in Cloud Secret Manager

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
